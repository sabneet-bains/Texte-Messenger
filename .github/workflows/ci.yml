name: tests

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Type check
        run: python -m mypy texte examples tests

      - name: Compile
        run: python -m compileall client.py server.py texte tests examples

      - name: Test
        run: python -m pytest

      - name: Demo smoke checks
        run: |
          python examples/two_client_demo.py --protocol tcp --port 33142
          python examples/two_client_demo.py --protocol udp --port 33143
          texte-server --help
          texte-showcase --help

      - name: Build
        run: python -m build
