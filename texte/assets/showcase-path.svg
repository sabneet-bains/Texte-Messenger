<svg width="1440" height="420" viewBox="0 0 1440 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1440" height="420" rx="36" fill="url(#bg)"/>

  <text x="60" y="72" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    GitHub-first showcase path
  </text>
  <text x="60" y="108" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Open the repo, enter Codespaces, and land in a browser-accessible desktop with real PyQt6 clients.
  </text>

  <g filter="url(#shadow)">
    <rect x="60" y="160" width="220" height="160" rx="22" fill="url(#card)" stroke="#374151"/>
    <rect x="320" y="160" width="220" height="160" rx="22" fill="url(#card)" stroke="#374151"/>
    <rect x="580" y="160" width="260" height="160" rx="22" fill="url(#card)" stroke="#374151"/>
    <rect x="890" y="160" width="490" height="160" rx="22" fill="url(#card)" stroke="#374151"/>
  </g>

  <text x="90" y="205" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">GitHub repo</text>
  <text x="90" y="238" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">README badge</text>
  <text x="90" y="270" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Open in Codespaces</text>

  <text x="350" y="205" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Codespaces</text>
  <text x="350" y="238" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Devcontainer</text>
  <text x="350" y="270" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Qt + Xvfb + noVNC</text>

  <text x="610" y="205" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Browser tab</text>
  <text x="610" y="238" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Remote desktop</text>
  <text x="610" y="270" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Real app, not a web clone</text>

  <text x="920" y="205" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Texte showcase</text>
  <text x="920" y="238" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Two signed-in clients</text>
  <text x="920" y="270" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="16">Alice and Bob ready to chat</text>

  <path d="M280 240H312" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M312 240L300 232" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M312 240L300 248" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <path d="M540 240H572" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M572 240L560 232" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M572 240L560 248" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <path d="M850 240H882" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M882 240L870 232" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M882 240L870 248" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="920" y="340" width="200" height="46" rx="12" fill="#111827" stroke="#374151"/>
    <rect x="1135" y="340" width="200" height="46" rx="12" fill="#111827" stroke="#374151"/>
  </g>
  <text x="944" y="369" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Alice window</text>
  <text x="1159" y="369" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Bob window</text>

  <rect x="60" y="344" width="740" height="2" fill="#374151" opacity="0.65"/>
  <text x="60" y="385" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    The browser tab opens a real desktop session, so visitors can click the actual app and see the protocol in motion.
  </text>
</svg>
