<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Texte local chat routing diagram</title>
  <desc id="desc">Two desktop chat clients send messages through UDP or TCP into a shared routing core.</desc>
  <rect width="1280" height="420" fill="#101828"/>
  <rect x="70" y="82" width="310" height="230" rx="20" fill="#182235" stroke="#344054" stroke-width="2"/>
  <rect x="900" y="82" width="310" height="230" rx="20" fill="#182235" stroke="#344054" stroke-width="2"/>
  <rect x="470" y="52" width="340" height="290" rx="24" fill="#151F32" stroke="#516CFF" stroke-width="2"/>
  <text x="225" y="135" text-anchor="middle" fill="#F9FAFB" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Alice</text>
  <text x="1055" y="135" text-anchor="middle" fill="#F9FAFB" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Bob</text>
  <text x="640" y="106" text-anchor="middle" fill="#F9FAFB" font-family="Segoe UI, Arial" font-size="28" font-weight="700">ChatRoom</text>
  <text x="640" y="146" text-anchor="middle" fill="#B7C0D7" font-family="Segoe UI, Arial" font-size="18">registration · presence · routing</text>
  <rect x="118" y="174" width="214" height="38" rx="10" fill="#F9FAFB"/>
  <rect x="948" y="174" width="214" height="38" rx="10" fill="#F9FAFB"/>
  <text x="225" y="199" text-anchor="middle" fill="#101828" font-family="Consolas, monospace" font-size="17">{TO}Bob|ping</text>
  <text x="1055" y="199" text-anchor="middle" fill="#101828" font-family="Consolas, monospace" font-size="17">{MSG}[09:07]</text>
  <path d="M380 196 C430 152 447 141 470 134" fill="none" stroke="#36D399" stroke-width="5" stroke-linecap="round"/>
  <path d="M810 134 C842 144 878 162 900 196" fill="none" stroke="#36D399" stroke-width="5" stroke-linecap="round"/>
  <path d="M900 234 C840 279 812 287 780 292" fill="none" stroke="#7DD3FC" stroke-width="5" stroke-linecap="round"/>
  <path d="M500 292 C457 282 420 263 380 234" fill="none" stroke="#7DD3FC" stroke-width="5" stroke-linecap="round"/>
  <circle cx="640" cy="218" r="56" fill="#243B80" stroke="#85A7FF" stroke-width="2"/>
  <text x="640" y="213" text-anchor="middle" fill="#F9FAFB" font-family="Segoe UI, Arial" font-size="17" font-weight="700">UDP / TCP</text>
  <text x="640" y="239" text-anchor="middle" fill="#D0D5DD" font-family="Segoe UI, Arial" font-size="15">one routing core</text>
  <text x="225" y="270" text-anchor="middle" fill="#98A2B3" font-family="Segoe UI, Arial" font-size="17">PyQt6 client</text>
  <text x="1055" y="270" text-anchor="middle" fill="#98A2B3" font-family="Segoe UI, Arial" font-size="17">PyQt6 client</text>
  <text x="640" y="382" text-anchor="middle" fill="#D0D5DD" font-family="Segoe UI, Arial" font-size="20">A local messenger prototype with visible protocol, routing, and verification.</text>
</svg>
